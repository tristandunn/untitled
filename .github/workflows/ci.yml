name: CI

on: # yamllint disable-line rule:truthy
  pull_request:
  workflow_call:

jobs:
  Ruby:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Ruby
        uses: ruby/setup-ruby@319994f95fa847cf3fb3cd3dbe89f6dcde9f178f # v1.295.0
        with:
          bundler-cache: true

      - name: Run the Ruby tests
        env:
          COVERAGE: true
          RAILS_ENV: test
          SE_AVOID_STATS: true
        run: bin/rails db:setup ruby:test

  JavaScript:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Enable the Corepack tool
        run: corepack enable

      - name: Install Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: ".tool-versions"

      - name: Install the Node dependencies
        run: yarn install

      - name: Run the JavaScript tests
        run: yarn test:coverage

  Linting:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Ruby
        uses: ruby/setup-ruby@319994f95fa847cf3fb3cd3dbe89f6dcde9f178f # v1.295.0
        with:
          bundler-cache: true

      - name: Enable the Corepack tool
        run: corepack enable

      - name: Install Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: ".tool-versions"

      - name: Install the Node dependencies
        run: yarn install

      - name: Lint the ERB
        run: bin/rake erb:lint

      - name: Lint the ERB (Herb)
        run: yarn lint:erb

      - name: Lint the Ruby
        run: bin/rubocop --format github --parallel

      - name: Lint the JavaScript
        run: yarn lint

      - name: Lint the CSS
        run: yarn lint:css

  Docker:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build the image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: false

  Vulnerabilities:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Ruby
        uses: ruby/setup-ruby@319994f95fa847cf3fb3cd3dbe89f6dcde9f178f # v1.295.0
        with:
          bundler-cache: true

      - name: Scan for vulnerabilities
        run: bin/brakeman --format github --no-pager

      - name: Scan for vulnerabilities in JavaScript dependencies
        run: bin/importmap audit
