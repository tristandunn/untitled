name: CI

on: # yamllint disable-line rule:truthy
  pull_request:
  workflow_call:

jobs:
  Ruby:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout the code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Ruby
        uses: ruby/setup-ruby@8e41b362d2589a22a44c1cfa214b3c83052c195b # v1.318.0
        with:
          bundler-cache: true

      - name: Run the Ruby tests
        env:
          COVERAGE: true
          RAILS_ENV: test
          SE_AVOID_STATS: true
        run: bin/rails db:setup ruby:test

  JavaScript:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout the code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Enable the Corepack tool
        run: corepack enable

      - name: Install Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: ".tool-versions"

      - name: Install the Node dependencies
        run: yarn install

      - name: Run the JavaScript tests
        run: yarn test:coverage

  Linting:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout the code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Ruby
        uses: ruby/setup-ruby@8e41b362d2589a22a44c1cfa214b3c83052c195b # v1.318.0
        with:
          bundler-cache: true

      - name: Enable the Corepack tool
        run: corepack enable

      - name: Install Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: ".tool-versions"

      - name: Install the Node dependencies
        run: yarn install

      - name: Lint the ERB
        run: bin/rake erb:lint

      - name: Lint the ERB (Herb)
        run: yarn lint:erb

      - name: Check the ERB formatting (Herb)
        run: yarn check:erb

      - name: Lint the Ruby
        run: bin/rubocop --format github --parallel

      - name: Lint the JavaScript
        run: yarn lint:js

      - name: Lint the CSS
        run: yarn lint:css

  Docker:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build the image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: false

  Vulnerabilities:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout the code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Ruby
        uses: ruby/setup-ruby@8e41b362d2589a22a44c1cfa214b3c83052c195b # v1.318.0
        with:
          bundler-cache: true

      - name: Scan for vulnerabilities
        run: bin/brakeman --format github --no-pager

      - name: Scan for vulnerabilities in JavaScript dependencies
        run: bin/importmap audit
